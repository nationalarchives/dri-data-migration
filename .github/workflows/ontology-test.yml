name: Ontology tests

on:
  push:
    paths:
      - 'Ontology.ttl'
      - '**/OntologyTest.cs'
  pull_request:
    paths:
      - 'Ontology.ttl'
      - '**/OntologyTest.cs'

jobs:
  test:
    name: Testing Ontology file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
            cd Tests
            dotnet run --no-restore --project "Ontology.Tests" --configuration Release
